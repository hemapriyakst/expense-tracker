spring.application.name=expense-tracker-backend

# Reads from env vars with local defaults as fallback, so the SAME jar/image
# runs locally and in the cloud (Render/Railway/AWS) just by setting env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate auto-creates/updates tables from your entities during dev.
# We'll switch this to 'validate' + a proper migration tool (Flyway) later
# once the schema stabilizes, so it doesn't accidentally alter production data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

# JWT signing secret - MUST be overridden via env var in production, never commit a real secret.
# This local default is fine for dev only, and is 32+ chars to satisfy HS256's minimum key length.
jwt.secret=${JWT_SECRET:dev-only-local-secret-key-change-me-in-prod-32chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
